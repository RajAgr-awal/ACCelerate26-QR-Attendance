<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<style>
  body { font-family: sans-serif; padding: 2rem; }
  .form-wrap { max-width: 400px; margin: 0 auto; background: #f9f9f9; padding: 2rem; border-radius: 8px; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; margin-bottom: .5rem; font-weight: bold; font-size: 14px; }
  input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
  #status { margin-top: 1rem; padding: 1rem; display: none; border-radius: 4px; }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>

<div class="form-wrap">
  <h2>Register Participant</h2>
  <form id="regForm">
    <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Phone</label><input type="text" id="phone" required></div>
    <div class="form-group"><label>College</label><input type="text" id="college" required></div>
    <div class="form-group"><label>Department</label><input type="text" id="department" required></div>
    <div class="form-group"><label>Year</label><input type="text" id="year" required></div>
    <button type="submit">Submit Registration</button>
  </form>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// Inline API logic for standalone file
const SUPABASE_URL = 'https://ionwyohuqszattwbrskr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvbnd5b2h1cXN6YXR0d2Jyc2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjE0MTYsImV4cCI6MjA5NDU5NzQxNn0.ksIBk0gJJHpLVAf_GJ15Y3fL2Fj-8K7-tJQZYWgNViM';
const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const generatedToken = 'ACC26-TOKEN-' + Math.random().toString(36).substring(2, 7).toUpperCase();
  const payload = {
    full_name: document.getElementById('fullName').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    college_name: document.getElementById('college').value,
    department: document.getElementById('department').value,
    year_of_study: document.getElementById('year').value,
    participant_code: 'ACC26-P002-' + Math.random().toString(36).substring(2, 7).toUpperCase(),
    qr_token: generatedToken,
    is_active: true
  };

  const statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  statusEl.className = '';
  statusEl.textContent = 'Registering...';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/participants`, {
      method: 'POST',
      headers,
      body: JSON.stringify(payload)
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || JSON.stringify(err));
    }
    
    statusEl.className = 'success';
    statusEl.innerHTML = `Successfully registered!<br><br>Here is your Entry Pass:<br><br><div id="qr-container" style="display:flex; justify-content:center; margin-top:15px; background:white; padding:15px; border-radius:10px;"></div><p style="text-align:center; font-family:monospace; margin-top:10px;">${generatedToken}</p>`;
    
    // Generate QR Code
    new QRCode(document.getElementById("qr-container"), { 
      text: generatedToken, 
      width: 200, 
      height: 200 
    });
    
    // Optionally hide the form inputs to clean up UI
    document.getElementById('regForm').style.display = 'none';

  } catch (err) {
    statusEl.className = 'error';
    statusEl.textContent = 'Error: ' + err.message;
  }
});
</script>
</body>
</html>
